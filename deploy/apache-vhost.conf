<VirtualHost *:80>
    ServerName pty.minisocket.io

    ProxyPreserveHost On
    ProxyRequests Off

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(.*)$ ws://127.0.0.1:3337/$1 [P,L]

    ProxyPass / http://127.0.0.1:3337/
    ProxyPassReverse / http://127.0.0.1:3337/

    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-Proto %{REQUEST_SCHEME}s

    ErrorLog /var/log/apache2/pty.minisocket.io-error.log
    CustomLog /var/log/apache2/pty.minisocket.io-access.log combined
</VirtualHost>
