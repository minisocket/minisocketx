<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — MinisocketX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body>
    <div class="bg-aurora">
        <div class="aurora-orb aurora-orb-1"></div>
        <div class="aurora-orb aurora-orb-2"></div>
        <div class="aurora-orb aurora-orb-3"></div>
    </div>

    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">The page you're looking for doesn't exist or the session has expired.</p>
        <a href="/" class="error-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1L1 9l8 8M2 9h15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Back to Home
        </a>
        <div class="error-logo"><span class="accent">minisocket</span>x</div>
    </div>

    <script>
    (function() {
        var g = document.createElement('div');
        g.className = 'mouse-glow';
        document.body.appendChild(g);
        document.addEventListener('mousemove', function(e) {
            g.style.left = e.clientX + 'px';
            g.style.top = e.clientY + 'px';
        });
    })();
    </script>
</body>
</html>
