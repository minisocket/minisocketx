<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MinisocketX Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=16">
</head>
<body class="terminal-page">
    <div class="bg-aurora">
        <div class="aurora-orb aurora-orb-1"></div>
        <div class="aurora-orb aurora-orb-2"></div>
        <div class="aurora-orb aurora-orb-3"></div>
    </div>
    <div id="toolbar">
        <div class="toolbar-left">
            <a href="/" class="logo"><span class="accent">minisocket</span>x</a>
            <span id="session-id" class="session-badge"></span>
            <span id="status" class="status connecting">Connecting...</span>
        </div>
        <div class="toolbar-center">
            <button id="new-shell-btn" class="tool-btn" title="New Terminal (Ctrl+Shift+N)">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <span>New Terminal</span>
            </button>
            <button id="zoom-fit-btn" class="tool-btn" title="Fit to View">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4 7h6M7 4v6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            </button>
            <span id="zoom-level" class="zoom-badge">100%</span>
        </div>
        <div class="toolbar-right">
            <span id="my-latency" class="latency-badge latency-good">--ms</span>
            <div id="user-avatars" class="user-avatars"></div>
            <span id="viewers" class="viewers-count"></span>
        </div>
    </div>

    <div id="viewport">
        <div id="grid"></div>
        <div id="canvas">
            <div id="cursor-layer"></div>
        </div>
        <div id="empty-hint" style="display:none">
            <div class="empty-hint-icon">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect x="6" y="10" width="36" height="28" rx="4" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M14 24l4 4 8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <p>Waiting for terminal sessions...</p>
            <span class="empty-hint-sub">The host hasn't opened any terminals yet, or click below to create one.</span>
            <button class="empty-hint-btn" onclick="document.getElementById('new-shell-btn').click()">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                New Terminal
            </button>
        </div>
    </div>

    <div id="name-modal" class="modal" style="display:none">
        <div class="modal-box">
            <div class="modal-icon">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="15" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    <path d="M6 35c0-7.7 6.3-14 14-14s14 6.3 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                </svg>
            </div>
            <h2>Join Session</h2>
            <p>Enter your name to collaborate on this terminal session.</p>
            <input type="text" id="name-input" placeholder="Your name" maxlength="32" autocomplete="off" spellcheck="false">
            <button id="name-btn" class="modal-btn">Join</button>
            <div class="modal-hint">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6a5 5 0 1010 0A5 5 0 001 6z" stroke="currentColor" stroke-width="1"/><path d="M6 4v1M6 7v1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                End-to-end encrypted session
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div class="overlay-content">
            <div class="overlay-logo"><span class="accent">minisocket</span>x</div>
            <div class="spinner"></div>
            <p id="overlay-text">Connecting to session...</p>
            <div id="overlay-sub" class="overlay-sub"></div>
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
    <script>
    var DOMAIN = '{{DOMAIN}}';
    var SESSION_ID = '{{SESSION_ID}}';
    </script>
    <script src="/js/app.js?v=11"></script>
</body>
</html>
